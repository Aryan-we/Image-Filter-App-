<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Filter App by AKDLife</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f4f4f4;
}

h2 {
    margin-top: 20px;
}

.container {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

img {
    width: 100%;
    margin-top: 15px;
    display: none;
    border-radius: 10px;
}

.controls {
    margin-top: 15px;
}

input[type="range"] {
    width: 100%;
}

button {
    margin: 5px;
    padding: 8px 15px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.upload input{
   
    position: absolute;
    opacity: 0;
    top: 0px;
    left: 0px;
    cursor: pointer;
}
.upload{
    height: 100%;
    width: 40%;
    position: relative;
}
.upload input{
    width: 100%;
    height: 100%;
}
button:hover {
    background: #0056b3;
}
    #loader {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #5b15ff;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1s ease;
    }

    #loader h1 {
      font-size: 36px;
      text-shadow: 0 0 10px #00ffe7;
    }
    #profile{
    display: block;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      margin: 20px 0;
      object-fit: cover;
      box-shadow: 0 0 40px #0ff;
    }

    .welcome-text {
      margin-top: 10px;
      font-size: 20px;
      color: #0ff;
      font-family: 'Courier New', monospace;
      border-right: 2px solid #0ff;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typing 3s steps(20, end) forwards, blink 2s infinite;
      
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 50%; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

 

    .spinner {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #0ff;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
   

    #img {
      width: 100%;
    }

    @media (max-width: 1000px) {
    h2 {
        font-size: 40px;
    }

    .container {
        width:100%;
        padding: 15px;
        border-radius: 10px;
    }

    button {
        font-size: 40px;
        padding: 15px;
    }
    .controls p{
        font-size: 35px;
    }

    .controls button {
    
        margin: 20px 0;
    }
}


</style>
</head>

<body>
<div id="loader">
    <img src="aryan.webp" width="100px" height="100px" id="profile" >
  <h1>Aryan Kumar Dubey</h1>
  
  <div class="welcome-text">Welcome to Aryan Dubey’s Image Filter App!</div>
 
</div>

<h2>Image Filter App</h2>

<div class="container">
        <button class="upload">Upload Image
        <input type="file" accept="image/*" onchange="upl()" id="upload">
    </button>
    <img id="img">
   
    <div class="controls">
        <p>Brightness: <span id="val1">0</span></p>
        <input type="range" id="bright" min="0" max="200" value="100" oninput="bright()">

        <p>Contrast: <span id="val2">0</span></p>
        <input type="range" id="contrast" min="0" max="200" value="100" oninput="contrast()">

        <p>Saturation: <span id="val3">0</span></p>
        <input type="range" id="saturate" min="0" max="200" value="100" oninput="saturate()">
    </div>

    <div class="controls">
        <button onclick="applyFilter('grayscale')">Grayscale</button>
        <button onclick="applyFilter('blur')">Blur</button>
        <button onclick="applyFilter('none')">Original</button>
    </div>

    <button onclick="download()">Download</button>

</div>

<script>
window.addEventListener("load", function () {
  setTimeout(() => {
    document.getElementById("loader").style.opacity = "0";
    
    setTimeout(() => {
      document.getElementById("loader").style.display = "none";
    }, 1000);

  }, 3000);
});
function bright(){
    var range = document.getElementById("bright").value;
    var image = document.getElementById("img");

    image.style.filter = "none";
    image.style.filter = "brightness(" + range + "%)";

    let val = range - 100;
    document.getElementById("val1").innerHTML = val;
}

function contrast(){
    var range = document.getElementById("contrast").value;
    var image = document.getElementById("img");

    image.style.filter = "none";
    image.style.filter = "contrast(" + range + "%)";

    let val = range - 100;
    document.getElementById("val2").innerHTML = val;
}


function saturate(){
    var range = document.getElementById("saturate").value;
    var image = document.getElementById("img");

    image.style.filter = "none";
    image.style.filter = "saturate(" + range + "%)";

    let val = range - 100;
    document.getElementById("val3").innerHTML = val;
}


function upl(){
    document.getElementById("img").style.display = "block";

    const preview = document.getElementById("img");
    const file = document.getElementById("upload").files[0];
    const reader = new FileReader();

    reader.addEventListener("load", () => {
        preview.src = reader.result;
    });

    if (file) {
        reader.readAsDataURL(file);
    }
}


function applyFilter(type) {
    const image = document.getElementById("img");

    document.getElementById("bright").value = 100;
    document.getElementById("contrast").value = 100;
    document.getElementById("saturate").value = 100;

    document.getElementById("val1").innerHTML = 0;
    document.getElementById("val2").innerHTML = 0;
    document.getElementById("val3").innerHTML = 0;

    if (type === "grayscale") {
        image.style.filter = "grayscale(100%)";
    } else if (type === "blur") {
        image.style.filter = "blur(5px)";
    } else {
        image.style.filter = "none";
    }
}

function download() {
    const img = document.getElementById("img");

    if (!img.src) {
        alert("Please upload an image!");
        return;
    }

    let name = prompt("Enter image name");
    if (name === null || name.trim() === "") {
        alert("Image name is required!");
        return;
    }

    name = name.trim();
    name = name.replace(/\.[^/.]+$/, "");

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;

    ctx.filter = window.getComputedStyle(img).filter;
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const link = document.createElement("a");
    link.download = name + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}


</script>

</body>
</html>
